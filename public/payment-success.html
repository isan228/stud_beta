<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успешна - stud.kg</title>
    <script>
        (function () {
            try {
                var href = window.location.href;
                var hasPaymentId = /(?:\?|&)paymentId=[\da-f-]{8}-/i.test(href);
                var q = new URLSearchParams(window.location.search);
                if (q.get('registration') === 'true' || q.get('reg') === '1' || hasPaymentId) return;
                window.location.replace('/profile');
            } catch (e) { /* остаёмся на странице */ }
        })();
    </script>
    <link rel="stylesheet" href="/styles.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        
        .success-container {
            max-width: 650px;
            width: 100%;
            margin: 0 auto;
            padding: 3.5rem 2.5rem;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .success-icon-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
            animation: scaleIn 0.5s ease-out 0.2s both;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }
        
        .success-icon {
            font-size: 4rem;
            color: white;
        }
        
        .success-title {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        
        .success-message {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.8;
            font-size: 1.05rem;
        }
        
        .success-message strong {
            color: var(--text-primary);
            font-weight: 600;
        }
        
        .payment-details {
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: 16px;
            margin: 2rem 0;
            text-align: left;
            border: 1px solid var(--border-color);
        }
        
        .payment-details h3 {
            margin-bottom: 1.25rem;
            color: var(--text-primary);
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .payment-details p {
            margin: 0.75rem 0;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .payment-details strong {
            color: var(--text-primary);
            font-weight: 600;
            margin-right: 1rem;
        }
        
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2.5rem;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 1rem 2.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 180px;
            border: none;
            cursor: pointer;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        
        .btn:active {
            transform: translateY(-1px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1d4ed8 100%);
            color: #000000 !important;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            font-weight: 600;
        }
        
        .btn-primary:hover {
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.4);
            color: #000000 !important;
        }
        
        /* Убеждаемся, что текст виден */
        .btn {
            color: inherit;
            text-decoration: none;
        }
        
        .btn-primary {
            color: #000000 !important;
        }
        
        
        /* Исправление для темной темы - кнопки должны быть видны */
        [data-theme="dark"] .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        [data-theme="dark"] .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .status-message {
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        
        .status-message.success {
            background: rgba(16, 185, 129, 0.1);
            border-color: #10b981;
            color: #059669;
        }
        
        .account-created-message {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(5, 150, 105, 0.05) 100%);
            border: 2px solid #10b981;
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
        }
        
        .account-created-message h3 {
            color: #059669;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        
        .account-created-message p {
            color: var(--text-secondary);
            margin: 0.5rem 0;
            line-height: 1.6;
        }
        
        .account-created-message .username {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        @media (max-width: 640px) {
            .success-container {
                padding: 2rem 1.5rem;
            }
            
            .success-title {
                font-size: 1.75rem;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="/"><h1>STUD.kg</h1></a>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Главная</a>
                <a href="/profile" class="nav-link">Профиль</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="success-container">
            <div class="success-icon-wrapper">
                <div class="success-icon">✓</div>
            </div>
            <h1 class="success-title">Оплата успешно завершена!</h1>
            <p class="success-message">
                Спасибо ваша оплата прошла пожалуйста зайдите ранее веденными данными
            </p>
            
            <div class="payment-details" id="paymentDetails" style="display: none;">
                <h3>Детали платежа</h3>
                <p><strong>Сумма:</strong> <span id="paymentAmount">-</span></p>
                <p><strong>Описание:</strong> <span id="paymentDescription">-</span></p>
                <p><strong>Статус:</strong> <span id="paymentStatus">Обрабатывается</span></p>
            </div>
            
            <div class="btn-group">
                <a href="/" class="btn btn-primary">Войти</a>
            </div>
        </div>
    </main>

    <script src="/app.js"></script>
    <script>
        initTheme();

        function extractPaymentId() {
            const q = new URLSearchParams(window.location.search);
            const direct = q.get('paymentId');
            if (direct) return direct.trim();
            const m = String(window.location.href).match(/(?:\?|&)paymentId=([\da-f-]{8}-[\da-f-]{4}-[\da-f-]{4}-[\da-f-]{4}-[\da-f-]{12})/i);
            return m ? m[1] : null;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amount');
        const description = urlParams.get('description');
        const userId = urlParams.get('userId');
        const isRegistration = urlParams.get('registration') === 'true';
        const paymentIdFromUrl = extractPaymentId();

        async function goToProfile() {
            window.location.replace('/profile');
        }

        /** Возврат с Finik: получить JWT по paymentId (регистрация) или сразу в кабинет (подписка). */
        async function tryFinishByPaymentId() {
            if (!paymentIdFromUrl) return false;
            const titleEl = document.querySelector('.success-title');
            const msgEl = document.querySelector('.success-message');
            if (titleEl) titleEl.textContent = 'Платёж принят';
            if (msgEl) {
                msgEl.innerHTML = '<p style="color: var(--text-secondary);">Открываем личный кабинет…</p>';
            }
            for (let attempt = 0; attempt < 45; attempt++) {
                try {
                    const r = await fetch('/api/payments/session-by-payment-id?paymentId=' + encodeURIComponent(paymentIdFromUrl));
                    let data = {};
                    try {
                        data = await r.json();
                    } catch (_) { /* empty */ }
                    if (r.ok && data.token) {
                        localStorage.setItem('token', data.token);
                        localStorage.removeItem('pendingRegistration');
                        sessionStorage.removeItem('pendingRegistration');
                        goToProfile();
                        return true;
                    }
                    if (r.ok && data.mode === 'subscription') {
                        goToProfile();
                        return true;
                    }
                    if (r.ok && data.consumed) {
                        goToProfile();
                        return true;
                    }
                } catch (e) {
                    console.warn('session-by-payment-id', e);
                }
                await new Promise(function (resolve) { setTimeout(resolve, 1500); });
            }
            return false;
        }

        (async function () {
            const finished = await tryFinishByPaymentId();
            if (finished) return;

            if (isRegistration) {
            const successTitle = document.querySelector('.success-title');
            const successMessage = document.querySelector('.success-message');
            const btnGroup = document.querySelector('.btn-group');
            
            if (successTitle) {
                successTitle.textContent = 'Регистрация успешна!';
            }
            
            if (successMessage) {
                successMessage.innerHTML = `
                    <p style="margin-bottom: 1rem; font-size: 1.1rem;">
                        Платеж уже подтвержден!
                    </p>
                    <p style="margin-bottom: 1rem;">
                        Войдите данными, которыми зарегистрировались.
                    </p>
                    <p style="font-size: 0.9rem; color: var(--text-muted);" id="statusMessage">
                        Проверка создания аккаунта...
                    </p>
                `;
            }
            
            if (btnGroup) {
                btnGroup.innerHTML = `
                    <a href="/login" class="btn btn-primary" id="loginBtn" style="display: none;">Войти</a>
                `;
            }
            
            let checkCount = 0;
            const maxChecks = 30;
            const statusMessage = document.getElementById('statusMessage');
            
            const checkAccountCreation = async () => {
                checkCount++;
                console.log(`🔍 Checking account creation (attempt ${checkCount}/${maxChecks})...`);
                
                if (statusMessage) {
                    statusMessage.textContent = `Проверка создания аккаунта... (${checkCount}/${maxChecks})`;
                }
                
                let pendingRegistration = localStorage.getItem('pendingRegistration');
                if (!pendingRegistration) {
                    pendingRegistration = sessionStorage.getItem('pendingRegistration');
                }
                
                if (!pendingRegistration) {
                    console.log('⚠️ No pending registration data found in localStorage or sessionStorage');
                    if (checkCount < maxChecks) {
                        setTimeout(checkAccountCreation, 2000);
                    } else {
                        if (statusMessage) {
                            statusMessage.textContent = 'Данные регистрации не найдены. Попробуйте войти вручную.';
                        }
                        const loginBtn = document.getElementById('loginBtn');
                        if (loginBtn) loginBtn.style.display = 'inline-block';
                    }
                    return;
                }
                
                try {
                    const regData = JSON.parse(pendingRegistration);
                    console.log('📝 Attempting login with:', { email: regData.email });
                    
                    const loginResponse = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            identifier: regData.email,
                            password: regData.password
                        })
                    });
                    
                    if (loginResponse.ok) {
                        const result = await loginResponse.json();
                        localStorage.setItem('token', result.token);
                        localStorage.removeItem('pendingRegistration');
                        sessionStorage.removeItem('pendingRegistration');
                        window.location.replace('/profile');
                        return;
                    } else {
                        const errorData = await loginResponse.json().catch(() => ({}));
                        const status = loginResponse.status;
                        console.log(`⏳ Account not ready yet (status: ${status})`, errorData);
                        
                        if (status === 401 || status === 404) {
                            if (statusMessage) {
                                statusMessage.textContent = `Ожидание создания аккаунта... (попытка ${checkCount}/${maxChecks})`;
                            }
                        } else if (status === 403) {
                            console.log('⚠️ User exists but not approved yet');
                            if (statusMessage) {
                                statusMessage.textContent = `Ожидание активации аккаунта... (попытка ${checkCount}/${maxChecks})`;
                            }
                        } else {
                            console.error('❌ Unexpected error during login check:', errorData);
                            if (statusMessage) {
                                statusMessage.textContent = `Ошибка: ${errorData.error || 'Неизвестная ошибка'}`;
                            }
                        }
                    }
                } catch (error) {
                    console.error('❌ Error checking account:', error);
                    if (statusMessage) {
                        statusMessage.textContent = `Ошибка проверки: ${error.message}`;
                    }
                }
                
                if (checkCount < maxChecks) {
                    setTimeout(checkAccountCreation, 2000);
                } else {
                    console.log('⏰ Max checks reached, showing manual login option');
                    if (statusMessage) {
                        statusMessage.innerHTML = `
                            <span style="color: var(--text-muted);">
                                Аккаунт еще не создан. Попробуйте войти через несколько минут или обратитесь в поддержку.
                            </span>
                        `;
                    }
                    const loginBtn = document.getElementById('loginBtn');
                    if (loginBtn) loginBtn.style.display = 'inline-block';
                }
            };
            
            console.log('🚀 Starting account creation check...');
            checkAccountCreation();
            }

        if (amount) {
            document.getElementById('paymentDetails').style.display = 'block';
            document.getElementById('paymentAmount').textContent = amount + ' сом';
            document.getElementById('paymentDescription').textContent = description || 'Оплата услуг';
        }
        
        const token = localStorage.getItem('token');
        if (token && userId) {
            // fetch(`/api/payments/transactions?userId=${userId}`)
        }
        })();
    </script>
</body>
</html>
