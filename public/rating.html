<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#2563eb">
    <title>Рейтинг - stud.kg</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .rating-page { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
        .rating-table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .rating-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .rating-table th, .rating-table td { padding: 0.875rem 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        .rating-table th { background: var(--bg-secondary); font-weight: 600; color: var(--text-primary); }
        .rating-table tr:last-child td { border-bottom: none; }
        .rating-table tr:hover td { background: var(--bg-secondary); }
        .rating-rank { font-weight: 700; color: var(--primary-color); min-width: 2.5rem; }
        .rating-rank.top1 { color: #f59e0b; }
        .rating-rank.top2 { color: #94a3b8; }
        .rating-rank.top3 { color: #b45309; }
        .rating-loading, .rating-empty { text-align: center; padding: 3rem; color: var(--text-secondary); }
        .rating-empty { font-size: 1.1rem; }
        .rating-period { margin-top: 0.5rem; color: var(--text-secondary); font-size: 0.95rem; }
        .my-rank-card { margin-top: 1rem; padding: 0.75rem 1rem; border: 1px solid var(--border-color); border-radius: 10px; background: var(--bg-secondary); }
        .my-rank-title { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.35rem; }
        .my-rank-value { font-weight: 700; color: var(--primary-color); }
        @media (max-width: 768px) {
            .rating-page { padding: 1.25rem 0.5rem; }
            .rating-table { min-width: 640px; font-size: 0.92rem; }
            .rating-table th, .rating-table td { padding: 0.65rem 0.75rem; }
        }
        @media (max-width: 480px) {
            .rating-table th:nth-child(4),
            .rating-table td:nth-child(4),
            .rating-table th:nth-child(5),
            .rating-table td:nth-child(5) {
                display: none;
            }
            .rating-table { min-width: 0; width: 100%; font-size: 0.88rem; }
            .rating-table th, .rating-table td { padding: 0.6rem 0.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand"><a href="/"><h1>stud.kg</h1></a></div>
            <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Меню"><span></span><span></span><span></span></button>
            <div class="nav-menu" id="navMenu">
                <a href="/" class="nav-link">Главная</a>
                <a href="/tests" class="nav-link">Тесты</a>
                <a href="/rating" class="nav-link active">Рейтинг</a>
                <a href="/news" class="nav-link">Новости</a>
                <a href="/about" class="nav-link">О нас</a>
                <a href="/favorites" class="nav-link" id="favoritesLink" style="display: none;">Избранное</a>
                <a href="/profile" class="nav-link" id="profileLink" style="display: none;">Профиль</a>
                <a href="/contact" class="nav-link">Обратная связь</a>
                <div class="nav-actions">
                    <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему"><span class="theme-icon">🌙</span></button>
                    <a href="/login" class="btn btn-primary" id="loginBtn">Войти</a>
                    <a href="/register" class="btn btn-secondary" id="registerBtn">Подписка</a>
                    <button class="btn btn-logout" id="logoutBtn" style="display: none;">Выход</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="rating-page">
            <div class="page-header" style="text-align: center; margin-bottom: 2rem;">
                <h1>Рейтинг</h1>
                <p class="page-description">Топ-20 за текущий месяц по количеству правильных ответов</p>
                <div class="rating-period" id="ratingPeriod"></div>
            </div>
            <div id="ratingContent">
                <div class="rating-loading" id="ratingLoading">Загрузка рейтинга...</div>
                <div id="ratingTableWrap" class="rating-table-wrap" style="display: none;"></div>
                <div id="myRankCard" class="my-rank-card" style="display: none;"></div>
                <div class="rating-empty" id="ratingEmpty" style="display: none;">Пока нет данных для рейтинга. Проходите тесты!</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 stud.kg. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        (function() {
            initTheme();
            var loadingEl = document.getElementById('ratingLoading');
            var tableWrap = document.getElementById('ratingTableWrap');
            var emptyEl = document.getElementById('ratingEmpty');
            var periodEl = document.getElementById('ratingPeriod');
            var myRankCard = document.getElementById('myRankCard');
            var token = localStorage.getItem('token');
            var headers = token ? { 'Authorization': 'Bearer ' + token } : {};

            fetch('/api/leaderboard?limit=20', { headers: headers })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    loadingEl.style.display = 'none';
                    var list = data.leaderboard || [];
                    var myEntry = data.currentUserEntry || null;
                    if (periodEl && data.period) {
                        var parts = String(data.period).split('-');
                        if (parts.length === 2) {
                            periodEl.textContent = 'Период рейтинга: ' + parts[1] + '.' + parts[0] + ' (обновляется каждый месяц)';
                        }
                    }
                    if (list.length === 0) {
                        emptyEl.style.display = 'block';
                        if (myRankCard) myRankCard.style.display = 'none';
                        return;
                    }
                    var html = '<table class="rating-table"><thead><tr><th>Место</th><th>Никнейм</th><th>Правильных ответов</th><th>Всего вопросов</th><th>Тестов</th><th>Точность %</th></tr></thead><tbody>';
                    list.forEach(function(row) {
                        var rankClass = row.rank === 1 ? ' top1' : (row.rank === 2 ? ' top2' : (row.rank === 3 ? ' top3' : ''));
                        html += '<tr><td class="rating-rank' + rankClass + '">' + row.rank + '</td><td>' + (row.username || '—') + '</td><td>' + row.correctAnswers + '</td><td>' + row.totalQuestionsAnswered + '</td><td>' + row.totalTestsCompleted + '</td><td>' + row.accuracy + '%</td></tr>';
                    });
                    html += '</tbody></table>';
                    tableWrap.innerHTML = html;
                    tableWrap.style.display = 'block';

                    if (myRankCard) {
                        if (myEntry) {
                            myRankCard.innerHTML =
                                '<div class="my-rank-title">Ваше место в рейтинге</div>' +
                                '<div class="my-rank-value">#' + myEntry.rank + ' — ' + (myEntry.username || '—') + '</div>' +
                                '<div style="margin-top:0.35rem;color:var(--text-secondary);font-size:0.9rem;">' +
                                'Правильных: ' + myEntry.correctAnswers + ', вопросов: ' + myEntry.totalQuestionsAnswered +
                                ', тестов: ' + myEntry.totalTestsCompleted + ', точность: ' + myEntry.accuracy + '%' +
                                '</div>';
                            myRankCard.style.display = 'block';
                        } else {
                            myRankCard.style.display = 'none';
                        }
                    }
                })
                .catch(function() {
                    loadingEl.style.display = 'none';
                    emptyEl.textContent = 'Не удалось загрузить рейтинг. Попробуйте позже.';
                    emptyEl.style.display = 'block';
                    if (myRankCard) myRankCard.style.display = 'none';
                });
        })();
    </script>
</body>
</html>
